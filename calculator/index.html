<!DOCTYPE html>
<html lang="en">

<head>
    <style>
        .main-container {
            background-color: #666666;
            width: 350px;
            margin: 20px auto;
            border: 2px solid #7e7a7a;
            border-radius: 10px;
        }

        .display-container {
            background-color: #262626;
            height: 120px;
            border: 2px solid #070707;
            border-radius: 10px;
        }

        .display-screen {
            background-color: #ccffeb;
            margin: 20px 18px;
            height: 60px;
            width: 300px;
            font-size: 55px;
            text-align: right;
        }

        .button-container {
            background-color: #666666;
            height: 330px;
            display: flex;
            border: 2px solid #7e7a7a;
            border-radius: 0 0 10px 10px;
            flex-direction: column;
            flex-wrap: wrap;
        }

        .btn {
            background-color: #262626;
            color: white;
            box-shadow: 1px 2px #151212;
            height: 43px;
            width: 50px;
            margin: 10px;
            font-size: 26px;
            border: 1px solid #535151;
            border-radius: 10px;
            cursor: pointer;
        }

        .btn-1 {
            height: 100px;
        }

        .btn-2 {
            background-color: #7e7a7a;
        }

        .btn:hover {
            background-color: #666666;
            color: white;
        }
    </style>
    <title>Calculator</title>
</head>

<body>
    <div class="main-container">
        <div class="display-container">
            <input type="text" value="0" class="display-screen" id="display" readonly>
        </div>
        <div class="button-container">
            <button class="btn">%</button>
            <button class="btn">+/-</button>
            <button class="btn">C</button>
            <button class="btn btn-2">AC</button>
            <button class="btn">0</button>

            <button class="btn">^</button>
            <button class="btn">7</button>
            <button class="btn">4</button>
            <button class="btn">1</button>
            <button class="btn">00</button>

            <button class="btn">(</button>
            <button class="btn">8</button>
            <button class="btn">5</button>
            <button class="btn">2</button>
            <button class="btn">.</button>

            <button class="btn">)</button>
            <button class="btn">9</button>
            <button class="btn">6</button>
            <button class="btn">3</button>
            <button class="btn">=</button>

            <button class="btn">/</button>
            <button class="btn">*</button>
            <button class="btn">-</button>
            <button class="btn btn-1">+</button>

        </div>
    </div>
    <script>

        const displayElement = document.getElementById("display");
        const buttonsElement = document.querySelectorAll(".btn");

        let currentInput = "";

        buttonsElement.forEach(button => {
            button.addEventListener("click", () => {
                const value = button.innerText;

                if (value === "AC") {
                    currentInput = "";
                    displayElement.value = "0";
                }
                else if (value === "C") {
                    currentInput = currentInput.slice(0, -1);
                    displayElement.value = currentInput || "0";
                }
                else if (value === "=") {
                    try {
                        currentInput = eval(currentInput);
                        displayElement.value = currentInput;
                    } catch {
                        displayElement.value = "Error";
                    }
                }
                else if (value === "+/-") {
                    currentInput = String(-eval(currentInput));
                    display.value = currentInput;
                }
                else {
                    currentInput += value;
                    displayElement.value = currentInput;
                }
            })
        })

    </script>

</body>

</html>
