<!DOCTYPE html>
<html lang="en">
<head>
    <title>Tribute Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: rgb(239, 240, 209);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: white;
            width: 80%;
            max-width: 900px;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            animation: fadeIn 1.5s ease-in-out;
        }
        h1 {
            font-size: 42px;
            color: #1e3c72;
        }

        h2 {
            font-weight: 300;
            color: #555;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Dr. A.P.J. Abdul Kalam</h1>
        <h2>The Missile Man of India</h2>

    </div>
    
</body>
</html>
