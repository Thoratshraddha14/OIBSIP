<!DOCTYPE html>
<html lang="en">
<head>
    <title>Tribute Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: rgb(50, 50, 112);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: white;
            width: 80%;
            max-width: 900px;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            animation: fadeIn 1.5s ease-in-out;
        }
    </style>
</head>
<body>
    <div class="card">

    </div>
    
</body>
</html>
