<!DOCTYPE html>
<html lang="en">

<head>
    <title>Login Authenticaion</title>
    <style>
        body {
            font-family: Arial;
            background: #203a43;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 50px;
            border-radius: 8px;
            width: 300px;
            text-align: center;
            font-size: 20px;

        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            font-size: 20px;
            
        }

        button {
            width: 100%;
            padding: 10px;
            margin-left: 10px;
            margin-top: 10px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Register</h2>

        <input type="text" id="User" placeholder="Username">
        <input type="password" id="regPass" placeholder="Password">
        <button onclick="register()">Register</button>

        <h2>Login</h2>

        <input type="text" id="loginUser" placeholder="Username">
        <input type="password" id="loginPass" placeholder="Password">
        <button onclick="login()">Login</button>

        <p id="message"></p>


    </div>
</body>

</html>
