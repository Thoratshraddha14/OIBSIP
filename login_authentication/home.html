<!DOCTYPE html>
<html>

<head>
    <title>Home</title>
    <style>
        body {
            font-family: Arial;
            background: #772763;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 70px;
            border-radius: 8px;
            width: 600px;
            text-align: center;
            font-size: 20px;
        }
        button{
            width: 50%;
            padding: 15px;
            margin-left: 10px;
            margin-top: 10px;
            background: red;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 20px;
        }

    </style>
</head>

<body>
    <div class="container">

        <h1>Welcome! You are logged in.</h1>

        <button onclick="logout()">Logout</button>

    </div>

    <script>

        function logout() {

            window.location = "index.html";

        }

    </script>

</body>

</html>
